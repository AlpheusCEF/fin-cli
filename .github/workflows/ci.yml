name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          # Point the path dependency at the cloned alph-cli
          git clone https://github.com/AlpheusCEF/alph-cli.git ../alph-cli
          poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -q

      - name: Run mypy
        run: poetry run mypy src/fin

      - name: Run ruff
        run: poetry run ruff check src/ tests/
